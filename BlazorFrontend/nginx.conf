events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # Proxy all /api/ calls to the API Gateway inside the Docker network.
        # This means the browser only ever needs to reach the frontend port -
        # no matter what URL Codespaces assigns, the gateway URL is always relative.
        location /api/ {
            proxy_pass         http://apigateway:8080/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Serve Blazor WASM static files
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            # Required for Blazor WASM client-side routing
            try_files $uri $uri/ /index.html;
        }

        # Correct MIME type for WebAssembly
        location ~* \.wasm$ {
            root  /usr/share/nginx/html;
            types { application/wasm wasm; }
        }
    }
}
