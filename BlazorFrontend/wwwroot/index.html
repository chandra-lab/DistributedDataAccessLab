<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Commerce Admin</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand span { font-weight: 800; }
        .hero-section { padding: 3rem 0 2rem; }
        .feature-card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,.10); border-radius: 12px; transition: transform .15s, box-shadow .15s; text-decoration: none; display: block; color: inherit; }
        .feature-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.15); color: inherit; }
        .feature-card.blue   { background: linear-gradient(135deg, #1d4ed8, #3b82f6); color: #fff !important; }
        .feature-card.purple { background: linear-gradient(135deg, #6d28d9, #8b5cf6); color: #fff !important; }
        .feature-card.teal   { background: linear-gradient(135deg, #0f766e, #14b8a6); color: #fff !important; }
        .feature-card .card-title { font-weight: 700; }
        .feature-card .card-text  { opacity: .85; }
        .product-card { border: 1px solid #dee2e6; border-radius: 10px; background: #fff; padding: 1.1rem; height: 100%; transition: box-shadow .15s; }
        .product-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
        #blazor-error-ui { display: none; position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; padding: .75rem 1.5rem; border-radius: 8px; font-size: .875rem; z-index: 9999; }
    </style>
</head>
<body>
    <div id="app">
        <div class="d-flex justify-content-center align-items-center" style="height:100vh; background:#0f172a">
            <div class="text-center text-white">
                <div class="mb-3" style="font-size:2rem; font-weight:800">E-Commerce Admin</div>
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-white-50">Loading application...</p>
            </div>
        </div>
    </div>
    <div id="blazor-error-ui">
        An unhandled error has occurred. <a href="" class="alert-link">Reload</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
