services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  customerservice:
    container_name: customerservice
    build:
      context: ./CustomerService/CustomerService.Api
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    volumes:
      - ./CustomerService/CustomerService.Api/Data:/app/Data

  productservice:
    container_name: productservice
    build:
      context: ./ProductService/ProductService.Api
      dockerfile: Dockerfile
    ports:
      - "5003:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    volumes:
      - ./ProductService/ProductService.Api/Data:/app/Data

  orderservice:
    container_name: orderservice
    build:
      context: ./OrderService/OrderService.Api
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CustomerServiceUrl: http://customerservice:8080/
      ProductServiceUrl: http://productservice:8080/
      RABBITMQ_HOST: rabbitmq
    depends_on:
      customerservice:
        condition: service_started
      productservice:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./OrderService/OrderService.Api/Data:/app/Data

  notificationservice:
    container_name: notificationservice
    build:
      context: ./NotificationService/NotificationService.Api
      dockerfile: Dockerfile
    ports:
      - "5004:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      RABBITMQ_HOST: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./NotificationService/NotificationService.Api/Data:/app/Data